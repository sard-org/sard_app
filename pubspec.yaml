name: mohamed_s_application1
description: A new Flutter project.
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.16
  flutter_bloc: ^8.1.6
  equatable: ^2.0.7
  shared_preferences: ^2.3.4
  connectivity_plus: ^6.1.1
  flutter_rating_bar: ^4.0.1
  pin_code_fields: ^8.0.1
  sms_autofill: ^2.4.1
  calendar_date_picker2: ^1.1.8
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/images/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins_SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins_Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins_Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins_Bold.ttf
          weight: 700

    - family: Alexandria
      fonts:
        - asset: assets/fonts/Alexandria_Regular.ttf
          weight: 400
        - asset: assets/fonts/Alexandria_SemiBold.ttf
          weight: 600

    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo_Regular.ttf
          weight: 400
        - asset: assets/fonts/Cairo_Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo_SemiBold.ttf
          weight: 600
